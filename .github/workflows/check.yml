name: Static check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Validate static site contract
        run: python3 scripts/check_static_site.py

      - name: Check JavaScript syntax
        run: node --check app.js
